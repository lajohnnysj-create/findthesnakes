<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(232,68,90,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(232,68,90,0)"/>
    </radialGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="550" ry="320" fill="url(#glow)"/>
  
  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(232,68,90,0.2)" stroke-width="2"/>
  
  <!-- Main headline -->
  <text x="600" y="210" font-family="Arial, sans-serif" font-weight="900" font-size="76" fill="#f0eef8" text-anchor="middle" letter-spacing="-2">Find people who</text>
  <text x="600" y="310" font-family="Arial, sans-serif" font-weight="900" font-size="76" fill="#e8445a" text-anchor="middle" letter-spacing="-2">unfollowed you</text>
  <text x="600" y="410" font-family="Arial, sans-serif" font-weight="900" font-size="76" fill="#f0eef8" text-anchor="middle" letter-spacing="-2">on Instagram</text>
  
  <!-- Subtext -->
  <text x="600" y="490" font-family="Arial, sans-serif" font-weight="400" font-size="30" fill="#7a788f" text-anchor="middle">No Instagram password required. Upload your own data.</text>
</svg>
