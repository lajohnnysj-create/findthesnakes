<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0f"/>
  
  <!-- Red accent dot (like logo) -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#e8445a" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Snake emoji style - simplified snake shape -->
  <!-- Body curve -->
  <path d="M 8 20 Q 10 12 16 14 Q 22 16 22 10" 
        stroke="#e8445a" stroke-width="3" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Snake head -->
  <circle cx="22" cy="9" r="3" fill="#e8445a"/>
  
  <!-- Snake eye -->
  <circle cx="23" cy="8" r="0.8" fill="#0a0a0f"/>
  
  <!-- Snake tongue -->
  <path d="M 24 10 L 26 9 M 24 10 L 26 11" 
        stroke="#e8445a" stroke-width="1" fill="none" 
        stroke-linecap="round"/>
  
  <!-- Tail tip -->
  <circle cx="8" cy="20" r="1.5" fill="#e8445a" opacity="0.7"/>
</svg>
